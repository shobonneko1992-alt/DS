<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>デイサービス 送迎表</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1e3a5f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="送迎表" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <style>* { box-sizing: border-box; margin: 0; padding: 0; } body { font-family: sans-serif; background: #f0f4f8; }</style>
</head>
<body>
  <div id="root"></div>
  <script>
// --- QRGen removed (text-only transfer) ---
var useState = React.useState, useMemo = React.useMemo, useRef = React.useRef, useEffect = React.useEffect;
const INIT_CARS = ["1号車", "2号車", "3号車", "4号車"];
const SEATS = 5;
const MAX = 18;
const WEEK = ["日", "月", "火", "水", "木", "金", "土"];
const INIT_PEOPLE = [
    "田中 花子", "山田 一郎", "佐藤 幸子", "鈴木 健二", "高橋 美代", "伊藤 正雄",
    "渡辺 節子", "中村 博", "小林 和子", "加藤 清", "吉田 光子", "山口 茂",
    "松本 富子", "井上 勝", "木村 千代", "林 英雄", "清水 絹子", "山崎 隆",
].map(function (name) { return { name: name, kana: "", memo: "", days: [], periods: [] }; });
const DAY_LABELS = ["月","火","水","木","金"];
const PERIOD_LABELS = ["AM","PM"];
const TIME_OPTIONS_AM = [];
for (let _h = 7; _h <= 13; _h++) {
    for (let _m = 0; _m < 60; _m += 5) {
        if (_h === 13 && _m > 0) break;
        TIME_OPTIONS_AM.push(String(_h).padStart(2, "0") + ":" + String(_m).padStart(2, "0"));
    }
}
const TIME_OPTIONS_PM = [];
for (let _h = 12; _h <= 18; _h++) {
    for (let _m = 0; _m < 60; _m += 5) {
        if (_h === 18 && _m > 0) break;
        TIME_OPTIONS_PM.push(String(_h).padStart(2, "0") + ":" + String(_m).padStart(2, "0"));
    }
}
function mkGrid() {
    return INIT_CARS.map(function () {
        return Array(SEATS).fill(null).map(function () {
            return { name: "", seatNo: "", time: "", color: "" };
        });
    });
}
function mkDay() { return { AM: mkGrid(), PM: mkGrid(), "AM_送り": mkGrid(), "PM_送り": mkGrid(), drivers: ["", "", "", ""] }; }
function gridKey(period, direction) { return direction === "送り" ? period + "_送り" : period; }
var ALL_GRID_KEYS = ["AM", "PM", "AM_送り", "PM_送り"];
function toKey(y, m, d) {
    return y + "-" + String(m + 1).padStart(2, "0") + "-" + String(d).padStart(2, "0");
}
function getMonMon(d) {
    var mon = new Date(d);
    var dow = mon.getDay();
    mon.setDate(mon.getDate() - (dow === 0 ? 6 : dow - 1));
    return mon;
}
function cloneGrid(g) {
    var result = { drivers: g.drivers ? g.drivers.slice() : ["", "", "", ""] };
    ALL_GRID_KEYS.forEach(function(key) {
        var src = g[key];
        if (src) {
            result[key] = src.map(function(c){ return (c||[]).map(function(s){ return Object.assign({}, s||{}); }); });
        } else {
            result[key] = mkGrid();
        }
    });
    if (g.extraPeople) {
        result.extraPeople = {};
        Object.keys(g.extraPeople).forEach(function(k) {
            result.extraPeople[k] = g.extraPeople[k].slice();
        });
    }
    return result;
}
function clearNameInGrid(g, name) {
    ALL_GRID_KEYS.forEach(function (key) {
        if (!g[key]) return;
        g[key].forEach(function (car) {
            if (!car) return;
            car.forEach(function (seat) {
                if (seat && seat.name === name) {
                    seat.name = ""; seat.seatNo = ""; seat.time = ""; seat.color = "";
                }
            });
        });
    });
}
function Badge(props) {
    var label = props.label, value = props.value, max = props.max;
    var color = props.color || "#2d6a9f", warn = props.warn;
    var pct = max ? Math.min(value / max, 1) * 100 : 0;
    return (React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 4 } },
        React.createElement("div", { style: { fontSize: 11, color: "#a0aec0", fontWeight: 600, whiteSpace: "nowrap" } }, label),
        React.createElement("div", { style: { fontSize: 15, fontWeight: 800, color: warn ? "#e53e3e" : color, whiteSpace: "nowrap" } },
            value,
            React.createElement("span", { style: { fontSize: 11, color: "#a0aec0", fontWeight: 500 } }, max ? "/" + max + "名" : "名")),
        max && (React.createElement("div", { style: { width: 30, height: 4, background: "#e0e7ef", borderRadius: 2, overflow: "hidden" } },
            React.createElement("div", { style: { height: "100%", width: pct + "%", background: warn ? "#e53e3e" : color, borderRadius: 2 } })))));
}
function getMondayKey(date) {
    var d = new Date(date);
    var dow = d.getDay();
    d.setDate(d.getDate() - (dow === 0 ? 6 : dow - 1));
    return toKey(d.getFullYear(), d.getMonth(), d.getDate());
}
var DAY_JP = ["日","月","火","水","木","金","土"];
var WEEK_SECTIONS = [
    { label: "AM 迎え", period: "AM", dir: "迎え" },
    { label: "AM 送り", period: "AM", dir: "送り" },
    { label: "PM 迎え", period: "PM", dir: "迎え" },
];
var COLOR_BG_MAP = { "": "", "gray": "#94a3b8", "yellow": "#fde047", "cyan": "#38bdf8", "green": "#4ade80" };

function WeekTable(props) {
    var allGrids = props.allGrids, setAllGrids = props.setAllGrids, selectedDate = props.selectedDate, carNames = props.carNames, drivers = props.drivers, driverList = props.driverList, absent = props.absent, people = props.people || [];
    var [section, setSection] = useState(0);
    var sec = WEEK_SECTIONS[section];

    // ── 色編集 ──────────────────────────────────────────────────────────
    var [weekColorMode, setWeekColorMode] = useState(false);
    var [weekPaintColor, setWeekPaintColor] = useState("");

    function setSeatWeekColor(dateKey, per, dir, ci, si, colorVal) {
        if (!setAllGrids) return;
        var gkey = gridKey(per, dir || "迎え");
        setAllGrids(function(prev) {
            var next = JSON.parse(JSON.stringify(prev));
            if (!next[dateKey]) return prev;
            if (!next[dateKey][gkey]) next[dateKey][gkey] = mkGrid();
            if (!next[dateKey][gkey][ci] || !next[dateKey][gkey][ci][si]) return prev;
            next[dateKey][gkey][ci][si].color = colorVal;
            return next;
        });
    }

    // ── ズームコントロール ────────────────────────────────────────────
    var [zoom, setZoom] = useState(1);
    var pinchRef = useRef(null);
    var lastDist = useRef(null);
    var startTouches = useRef(null);
    function getPinchDist(t) {
        var dx = t[0].clientX - t[1].clientX;
        var dy = t[0].clientY - t[1].clientY;
        return Math.sqrt(dx * dx + dy * dy);
    }
    function onPinchStart(e) {
        if (e.touches.length === 2) {
            lastDist.current = getPinchDist(e.touches);
            startTouches.current = [
                { x: e.touches[0].clientX, y: e.touches[0].clientY },
                { x: e.touches[1].clientX, y: e.touches[1].clientY },
            ];
        }
    }
    function onPinchMove(e) {
        if (e.touches.length === 2 && lastDist.current && startTouches.current) {
            var dx0 = Math.abs(e.touches[0].clientX - startTouches.current[0].x);
            var dy0 = Math.abs(e.touches[0].clientY - startTouches.current[0].y);
            var dx1 = Math.abs(e.touches[1].clientX - startTouches.current[1].x);
            var dy1 = Math.abs(e.touches[1].clientY - startTouches.current[1].y);
            if (dx0 + dx1 <= dy0 + dy1) return; // 縦スクロールは無視
            var dist = getPinchDist(e.touches);
            setZoom(function(z) {
                return Math.min(2, Math.max(0.4, parseFloat((z + (dist - lastDist.current) * 0.003).toFixed(3))));
            });
            lastDist.current = dist;
        }
    }
    function onPinchEnd() { lastDist.current = null; startTouches.current = null; }
    var [showPrintMenu, setShowPrintMenu] = useState(false);

    // Get Mon-Fri of the selected date's week
    var weekDates = React.useMemo(function() {
        if (!selectedDate) return [];
        var mon = new Date(getMondayKey(new Date(selectedDate + "T00:00:00")) + "T00:00:00");
        var days = [];
        for (var i = 0; i < 7; i++) {
            if (days.length >= 5) break;
            var d = new Date(mon.getTime());
            d.setDate(d.getDate() + i);
            if (d.getDay() !== 0 && d.getDay() !== 6) {
                var key = toKey(d.getFullYear(), d.getMonth(), d.getDate());
                days.push({ key: key, label: (d.getMonth()+1) + "/" + d.getDate() + "（" + DAY_JP[d.getDay()] + "）" });
            }
        }
        return days;
    }, [selectedDate]);

    if (!selectedDate || weekDates.length === 0) {
        return React.createElement("div", { style: { padding: 20, color: "#a0aec0", textAlign: "center" } }, "日付を選択してください");
    }

    var SEAT_COUNT = 5;

    // ── 苗字安全抽出ユーティリティ ─────────────────────────────────────
    // null/undefined/空文字はガードして空文字を返す。
    // 前後の余分なスペースをtrimしたうえで、
    // 半角・全角・連続スペースを区切りとして分割し、先頭要素（苗字）を返す。
    // スペースが一切ない場合は元の文字列をそのまま返す。
    function getSurname(rawName) {
        if (rawName == null || rawName === "") return "";
        var trimmed = rawName.trim();
        if (!trimmed) return "";
        var parts = trimmed.split(/[\s\u3000]+/);
        return (parts[0] && parts[0].length > 0) ? parts[0] : trimmed;
    }

    function buildWeekPrintHtml(sections) {
        var colorBgMap = { "": "", "gray": "#94a3b8", "yellow": "#fde047", "cyan": "#38bdf8", "green": "#4ade80" };
        var mon = new Date(getMondayKey(new Date(selectedDate + "T00:00:00")) + "T00:00:00");
        var fri = new Date(mon.getTime()); fri.setDate(fri.getDate() + 4);
        var title = (mon.getMonth()+1) + "/" + mon.getDate() + "〜" + (fri.getMonth()+1) + "/" + fri.getDate();

        var isAmMukae = sections.length === 1 && sections[0].period === "AM" && sections[0].dir === "迎え";

        var tablesHtml = sections.map(function(sec) {
            var isAmOkuri = sec.period === "AM" && sec.dir === "送り";
            var isPmMukae = sec.period === "PM" && sec.dir === "迎え";

            // ========== AM迎え設定 変更禁止 ==========
            var fs_head = isAmMukae ? 12 : 8;
            var fs_name = isAmMukae ? [16, 18, 20] : [9, 9, 9];
            var fs_time = isAmMukae ? 14 : 9;
            var fs_label = isAmMukae ? 9 : 7;
            var pad_head = isAmMukae ? "4px 2px" : "2px 1px";
            // ========== AM迎え設定 ここまで ==========

            var colW = isAmMukae ? "11.776%" : "18.4%";
            var leftW = isAmMukae ? "1.6%" : "4%";

            var headCells = weekDates.map(function(wd) {
                return '<th style="width:' + colW + ';background:#1e3a5f;color:white;font-size:' + fs_head + 'px;padding:' + pad_head + ';text-align:center;border:1px solid #374151;word-break:break-all;line-height:1.3;">' + (isPmMukae ? '' : wd.label) + '</th>';
            }).join("");

            var thead = isPmMukae
                ? '<thead><tr><th style="width:' + leftW + ';background:#1e3a5f;border:1px solid #374151;"></th><th style="width:' + leftW + ';background:#1e3a5f;border:1px solid #374151;"></th>' + headCells + '</tr></thead>'
                : '<thead><tr>' +
                    '<th style="width:' + leftW + ';background:#1e3a5f;color:white;font-size:' + fs_label + 'px;padding:' + pad_head + ';border:1px solid #374151;text-align:center;writing-mode:vertical-rl;text-orientation:upright;">' + (isAmOkuri ? '' : '運転者') + '</th>' +
                    '<th style="width:' + leftW + ';background:#1e3a5f;color:white;font-size:' + fs_label + 'px;padding:' + pad_head + ';border:1px solid #374151;text-align:center;writing-mode:vertical-rl;text-orientation:upright;">' + (isAmOkuri ? '' : '号車') + '</th>' +
                    headCells + '</tr></thead>';

            var tbody = props.carNames.map(function(cname, ci) {
                var drName = "";
                for (var wi = 0; wi < weekDates.length; wi++) {
                    var wdKey = weekDates[wi].key;
                    var dayDrv = allGrids[wdKey] && allGrids[wdKey].drivers && allGrids[wdKey].drivers[ci];
                    if (dayDrv) { drName = dayDrv; break; }
                }
                return Array(SEAT_COUNT).fill(null).map(function(_, si) {
                    var drvCell = si === 0 ? '<td rowspan="' + SEAT_COUNT + '" style="width:' + leftW + ';background:#1e3a5f;color:white;font-size:' + (drName.length >= 4 ? fs_label : fs_label + 1) + 'px;font-weight:700;padding:2px 0;border:1px solid #374151;text-align:center;vertical-align:middle;writing-mode:vertical-rl;text-orientation:upright;letter-spacing:0.05em;">' + (drName || "—") + '</td>' : '';
                    var carCell = si === 0 ? '<td rowspan="' + SEAT_COUNT + '" style="width:' + leftW + ';background:#2d6a9f;color:white;font-size:' + (cname.length >= 4 ? fs_label : fs_label + 1) + 'px;font-weight:700;padding:2px 0;border:1px solid #374151;text-align:center;vertical-align:middle;writing-mode:vertical-rl;text-orientation:upright;letter-spacing:0.05em;">' + cname + '</td>' : '';
                    var dateCells = weekDates.map(function(wd) {
                        var dayGrid = allGrids[wd.key];
                        var rGk = gridKey(sec.period, sec.dir);
                        var seat = dayGrid && dayGrid[rGk] && dayGrid[rGk][ci] && dayGrid[rGk][ci][si];
                        var name = seat ? seat.name : "";
                        var time = seat ? seat.time : "";
                        var color = seat ? (seat.color || "") : "";
                        var bg = colorBgMap[color] || (name ? "#f1f8e9" : "#fafafa");
                        var surname = getSurname(name);
                        var nfs = surname.length >= 4 ? fs_name[0] : surname.length === 3 ? fs_name[1] : fs_name[2];
                        var timeStr = (!isAmOkuri) ? (time || "") : "";

                        var cellContent;
                        if (!surname) {
                            cellContent = '<span style="color:#ddd;font-size:' + fs_time + 'px;">—</span>';
                        } else if (isAmMukae) {
                            // AM迎え: 名前の下に時間
                            cellContent = '<div style="font-weight:700;color:#1e3a5f;font-size:' + Math.round(nfs * 0.8) + 'px;line-height:1.2;letter-spacing:0.15em;text-align:center;">' + surname + '</div>' +
                                (timeStr ? '<div style="color:#1a1a1a;font-size:' + Math.round(fs_time * 1.2) + 'px;text-align:center;">' + timeStr + '</div>' : '');
                        } else if (isAmOkuri) {
                            // AM送り: 名前のみ
                            cellContent = '<div style="font-weight:700;color:#1e3a5f;font-size:8px;line-height:1;text-align:center;letter-spacing:0.1em;">' + surname + '</div>';
                        } else {
                            // PM迎え: 名前と時間を横並び
                            cellContent = '<div style="display:flex;align-items:center;justify-content:center;width:100%;">' +
                                '<span style="font-weight:700;color:#1e3a5f;font-size:13px;display:inline-block;width:3em;text-align:right;margin-right:3em;">' + surname + '</span>' +
                                (timeStr ? '<span style="color:#1a1a1a;font-size:13px;display:inline-block;width:4em;text-align:left;">' + timeStr + '</span>' : '<span style="display:inline-block;width:4em;"></span>') +
                                '</div>';
                        }

                        return '<td style="background:' + bg + ';border:1px solid #e0e7ef;padding:1px;text-align:center;vertical-align:middle;">' +
                            '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100%;">' +
                            cellContent + '</div></td>';
                    }).join("");

                    var borderBottom = si === SEAT_COUNT - 1 ? "border-bottom:2px solid #1e3a5f;" : "";
                    return '<tr style="' + borderBottom + '">' + drvCell + carCell + dateCells + '</tr>';
                }).join("");
            }).join("");

            var ufs = isAmMukae ? 18 : 9;
            var uLabelFs = isAmMukae ? 13 : 8;
            var unassignedByDay = weekDates.map(function(wd) {
                var dayGrid = allGrids[wd.key];
                var tGk = gridKey(sec.period, sec.dir);
                var assignedNames = new Set();
                if (dayGrid && dayGrid[tGk]) {
                    dayGrid[tGk].forEach(function(car) {
                        if (!car) return;
                        car.forEach(function(s) { if (s && s.name) assignedNames.add(s.name); });
                    });
                }
                var dateObj = new Date(wd.key + "T00:00:00");
                var dow = dateObj.getDay();
                var DAY_IDX = [null, 0, 1, 2, 3, 4, null];
                var dayIdx = DAY_IDX[dow];
                return people.filter(function(p) {
                    if (!p || !p.name) return false;
                    if (assignedNames.has(p.name)) return false;
                    var hasDayPeriods = p.dayPeriodsEnabled && p.dayPeriods && Object.keys(p.dayPeriods).length > 0;
                    if (hasDayPeriods) {
                        var dp = p.dayPeriods[dayIdx];
                        if (!dp) return false;
                        return dp.indexOf(sec.period) >= 0;
                    }
                    var inDay = Array.isArray(p.days) && p.days.indexOf(dayIdx) >= 0;
                    var inPeriod = Array.isArray(p.periods) && p.periods.indexOf(sec.period) >= 0;
                    return inDay && inPeriod;
                }).sort(function(a, b) {
                    var fa = a.furigana || a.name || "";
                    var fb = b.furigana || b.name || "";
                    return fa.localeCompare(fb, 'ja');
                }).map(function(p) { return getSurname(p.name); });
            });

            var makeUnassignedRow = function(rowIdx) {
                var cells = "";
                for (var wi = 0; wi < weekDates.length; wi++) {
                    var arr = unassignedByDay[wi] || [];
                    var name = arr[rowIdx] || "";
                    cells += '<td style="background:#fafafa;font-size:' + ufs + 'px;padding:2px;border:1px solid #e0e7ef;text-align:center;">' +
                        (name ? '<span style="font-weight:700;color:#c05300;">' + name + '</span>' : '<span style="color:#ddd;">—</span>') + '</td>';
                }
                return cells;
            };

            var unassignedRow = isAmOkuri ? "" :
                '<tr><td colspan="2" style="background:#4a6fa5;color:white;font-size:' + uLabelFs + 'px;font-weight:700;padding:2px;border:1px solid #374151;text-align:center;">その他</td>' + makeUnassignedRow(0) + '</tr>' +
                '<tr><td colspan="2" style="background:#4a6fa5;padding:2px;border:1px solid #374151;"></td>' + makeUnassignedRow(1) + '</tr>';

            var totalCells = weekDates.map(function(wd) {
                var dayGrid = allGrids[wd.key];
                var tGk = gridKey(sec.period, sec.dir);
                var total = 0; var assignedNames = new Set();
                if (dayGrid && dayGrid[tGk]) {
                    dayGrid[tGk].forEach(function(car) { if (!car) return; car.forEach(function(s) { if (s && s.name) { total++; assignedNames.add(s.name); } }); });
                }
                var dayIdx = [null,0,1,2,3,4,null][new Date(wd.key + "T00:00:00").getDay()];
                total += (people || []).filter(function(p) {
                    if (!p || !p.name || assignedNames.has(p.name)) return false;
                    if (p.dayPeriodsEnabled && p.dayPeriods && Object.keys(p.dayPeriods).length > 0) {
                        var dp = p.dayPeriods[dayIdx]; return dp && dp.indexOf(sec.period) >= 0;
                    }
                    return Array.isArray(p.days) && p.days.indexOf(dayIdx) >= 0 && Array.isArray(p.periods) && p.periods.indexOf(sec.period) >= 0;
                }).length;
                var tfs = isAmMukae ? 20 : 10;
                return '<td style="background:#1e3a5f;color:white;font-size:' + tfs + 'px;font-weight:800;padding:' + (isAmMukae ? "6px" : "2px") + ';border:1px solid #374151;text-align:center;">' + (total > 0 ? total + "名" : "0") + '</td>';
            }).join("");

            var tLabelFs = isAmMukae ? 18 : 9;
            var totalRow = isAmOkuri ? "" : '<tr style="border-top:3px solid #1e3a5f;"><td colspan="2" style="background:#1e3a5f;color:white;font-size:' + tLabelFs + 'px;font-weight:700;padding:2px;border:1px solid #374151;text-align:center;">合計</td>' + totalCells + '</tr>';

            var secFlex = isAmOkuri ? "flex:1;" : (isPmMukae ? "flex:1.5;" : "flex:1;");
            return '<div class="sec-wrap" style="' + secFlex + 'display:flex;flex-direction:column;">' +
                '<div style="background:#2d6a9f;color:white;font-weight:700;font-size:9px;padding:1px 4px;line-height:1.4;flex-shrink:0;">' + sec.label + '</div>' +
                '<table style="width:100%;border-collapse:collapse;table-layout:fixed;flex:1;height:100%;">' +
                thead + '<tbody style="height:100%;">' + tbody + unassignedRow + totalRow + '</tbody></table></div>';
        }).join("");

        return '<!DOCTYPE html><html><head><meta charset="utf-8"><title>' + title + '</title>' +
            '<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap">' +
            '<style>' +
            'html,body{margin:0;padding:0;box-sizing:border-box;}' +
            'body{font-family:"Noto Sans JP","Meiryo","MS PGothic",sans-serif;font-size:9px;background:#f0f0f0;display:flex;justify-content:center;padding:20px;box-sizing:border-box;}' +
            'h2{margin:0 0 2mm;font-size:11px;font-weight:bold;flex-shrink:0;padding-left:1em;}' +
            'table{width:100%;border-collapse:collapse;table-layout:fixed;}' +
            'td,th{padding:1px;vertical-align:middle;overflow:hidden;}' +
